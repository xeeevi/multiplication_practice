<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practica les Taules de Multiplicar!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #27ae60;
    --green-sh: #1e8449;
    --yellow: #f39c12;
    --yellow-sh: #d68910;
    --orange: #e67e22;
    --orange-sh: #ca6f1e;
    --coral: #e74c3c;
    --coral-sh: #cb4335;
    --blue: #2980b9;
    --blue-sh: #1f618d;
    --purple: #8e44ad;
    --purple-sh: #6c3483;
    --bg: #fff8ef;
    --card: #ffffff;
    --card2: #fef5e7;
    --text: #2d2a26;
    --text-soft: #6b6560;
    --border: #e0d5c8;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #fff8ef 0%, #e8f5fb 55%, #fdf9e7 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Floating background math symbols */
  .bg-deco {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .bg-deco span {
    position: absolute;
    font-size: 2.2em;
    font-weight: 900;
    color: #3498db;
    opacity: 0.06;
    animation: float var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-18px) rotate(8deg); }
  }

  /* Language bar */
  .lang-bar {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 10px 16px 0;
    position: relative;
    z-index: 10;
  }

  .lang-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-bottom: 3px solid #c8bfb5;
    border-radius: 10px;
    color: var(--text-soft);
    font-family: 'Nunito', sans-serif;
    font-size: 0.82em;
    font-weight: 700;
    padding: 5px 11px;
    cursor: pointer;
    transition: all 0.12s;
    touch-action: manipulation;
  }

  .lang-btn:active { transform: translateY(2px); border-bottom-width: 1px; }

  .lang-btn.active {
    background: var(--blue);
    border-color: var(--blue-sh);
    border-bottom-color: var(--blue-sh);
    color: white;
  }

  /* Container */
  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 8px 18px 40px;
  }

  h1 {
    text-align: center;
    font-size: 2.1em;
    font-weight: 900;
    color: var(--orange);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  /* Screens */
  .screen { display: none; }
  .screen.active { display: block; }

  .section-title {
    font-size: 1.15em;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text);
  }

  /* Name section */
  .name-section {
    text-align: center;
    margin-bottom: 22px;
    background: var(--card);
    border-radius: 20px;
    padding: 16px 20px;
    box-shadow: 0 4px 0 var(--border);
  }

  .name-label {
    display: block;
    margin-bottom: 8px;
    color: var(--text-soft);
    font-weight: 700;
    font-size: 0.95em;
  }

  .name-input {
    background: var(--card2);
    border: 2px solid var(--border);
    border-bottom: 3px solid #c8bfb5;
    border-radius: 12px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1.2em;
    font-weight: 700;
    text-align: center;
    padding: 9px 20px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  .name-input:focus { border-color: var(--blue); border-bottom-color: var(--blue-sh); }

  /* Tables grid */
  .tables-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 9px;
    margin-bottom: 10px;
  }

  .table-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-bottom: 4px solid #c8bfb5;
    border-radius: 14px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1.45em;
    font-weight: 900;
    padding: 14px 0;
    cursor: pointer;
    transition: all 0.12s;
    touch-action: manipulation;
  }

  .table-btn:hover { border-color: var(--blue); color: var(--blue); }
  .table-btn:active { transform: translateY(3px); border-bottom-width: 1px; }

  .table-btn.selected {
    background: var(--blue);
    border-color: var(--blue-sh);
    border-bottom-color: var(--blue-sh);
    color: white;
  }

  /* Helper buttons */
  .select-helpers {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .helper-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-bottom: 3px solid #c8bfb5;
    border-radius: 20px;
    color: var(--text-soft);
    font-family: 'Nunito', sans-serif;
    font-size: 0.88em;
    font-weight: 700;
    padding: 7px 15px;
    cursor: pointer;
    transition: all 0.12s;
    touch-action: manipulation;
  }

  .helper-btn:hover { border-color: var(--purple); color: var(--purple); }
  .helper-btn:active { transform: translateY(2px); border-bottom-width: 1px; }

  /* Mode grid */
  .mode-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 11px;
    margin-bottom: 22px;
  }

  .mode-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-bottom: 5px solid #c8bfb5;
    border-radius: 18px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1.02em;
    font-weight: 700;
    padding: 17px 10px;
    cursor: pointer;
    transition: all 0.12s;
    text-align: center;
    touch-action: manipulation;
  }

  .mode-btn:hover { border-color: var(--orange); }
  .mode-btn:active { transform: translateY(4px); border-bottom-width: 1px; }

  .mode-btn.selected {
    background: var(--orange);
    border-color: var(--orange-sh);
    border-bottom-color: var(--orange-sh);
    color: white;
  }

  .mode-btn .mode-icon { font-size: 1.65em; display: block; margin-bottom: 5px; }
  .mode-btn .mode-bonus { font-size: 0.78em; color: var(--orange); margin-top: 4px; font-weight: 700; }
  .mode-btn.selected .mode-bonus { color: rgba(255,255,255,0.85); }

  /* Start button */
  .start-btn {
    display: block;
    width: 100%;
    padding: 17px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.45em;
    font-weight: 900;
    border: none;
    border-bottom: 6px solid var(--green-sh);
    border-radius: 20px;
    cursor: pointer;
    background: var(--green);
    color: white;
    transition: all 0.12s;
    touch-action: manipulation;
    box-shadow: 0 2px 12px rgba(39,174,96,0.28);
  }

  .start-btn:hover:not(:disabled) { filter: brightness(1.07); }
  .start-btn:active:not(:disabled) { transform: translateY(5px); border-bottom-width: 1px; }
  .start-btn:disabled { opacity: 0.38; cursor: not-allowed; }

  .nav-lb-btn {
    display: block;
    margin: 14px auto 0;
    background: transparent;
    border: 2px solid var(--orange);
    border-bottom: 3px solid var(--orange-sh);
    border-radius: 14px;
    color: var(--orange);
    font-family: 'Nunito', sans-serif;
    font-size: 0.98em;
    font-weight: 700;
    padding: 9px 26px;
    cursor: pointer;
    transition: all 0.12s;
    touch-action: manipulation;
  }

  .nav-lb-btn:hover { background: var(--orange); color: white; }
  .nav-lb-btn:active { transform: translateY(2px); border-bottom-width: 1px; }

  /* Game header */
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .score-display, .timer-display, .streak-display {
    background: var(--card);
    border-radius: 13px;
    padding: 8px 16px;
    font-weight: 700;
    font-size: 1.02em;
    color: var(--text);
    box-shadow: 0 3px 0 var(--border);
  }

  .timer-display { color: var(--orange); }
  .timer-display.warning { color: var(--orange); animation: pulse 0.5s infinite; }
  .timer-display.danger { color: var(--coral); animation: pulse 0.3s infinite; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

  .streak-display { color: var(--orange); }

  /* Progress */
  .progress-bar {
    background: #e8ddd0;
    border-radius: 10px;
    height: 13px;
    overflow: hidden;
    margin-bottom: 7px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--blue));
    border-radius: 10px;
    transition: width 0.3s;
  }

  .progress-text {
    text-align: center;
    color: var(--text-soft);
    font-size: 0.88em;
    margin-bottom: 13px;
    font-weight: 700;
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border-radius: 28px;
    padding: 30px 20px 22px;
    text-align: center;
    margin-bottom: 14px;
    box-shadow: 0 6px 0 var(--border);
    position: relative;
    overflow: hidden;
  }

  .question-text {
    font-size: 3.2em;
    font-weight: 900;
    margin-bottom: 20px;
    color: var(--text);
  }

  .question-text .operator { color: var(--coral); }
  .question-text .equals { color: var(--orange); }

  .answer-input {
    background: var(--card2);
    border: 3px solid var(--blue);
    border-bottom: 5px solid var(--blue-sh);
    border-radius: 16px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 2.4em;
    font-weight: 700;
    text-align: center;
    width: 170px;
    padding: 9px;
    outline: none;
    transition: border-color 0.22s;
    -moz-appearance: textfield;
  }

  .answer-input::-webkit-outer-spin-button,
  .answer-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .answer-input:focus { border-color: var(--purple); border-bottom-color: var(--purple-sh); }
  .answer-input.correct { border-color: var(--green); border-bottom-color: var(--green-sh); background: #eafaf1; }
  .answer-input.wrong { border-color: var(--coral); border-bottom-color: var(--coral-sh); background: #fef0ee; animation: shake 0.4s; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }

  .feedback {
    font-size: 1.15em;
    font-weight: 700;
    margin-top: 12px;
    min-height: 1.5em;
    color: var(--text);
  }

  .feedback.correct-fb { color: var(--green); }
  .feedback.wrong-fb { color: var(--coral); }

  /* Number pad */
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
    max-width: 270px;
    margin: 16px auto 0;
  }

  .pad-btn {
    background: var(--card2);
    border: 2px solid var(--border);
    border-bottom: 4px solid #c8bfb5;
    border-radius: 13px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1.55em;
    font-weight: 700;
    padding: 13px 0;
    cursor: pointer;
    transition: all 0.1s;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  .pad-btn:hover { background: #fdebd0; border-color: var(--orange); }
  .pad-btn:active { transform: translateY(3px); border-bottom-width: 1px; }

  .pad-back {
    background: #fff3e6;
    border-color: var(--orange);
    border-bottom-color: var(--orange-sh);
    color: var(--orange);
  }

  .pad-check {
    grid-column: span 3;
    background: var(--green);
    border: none;
    border-bottom: 5px solid var(--green-sh);
    color: white;
    font-size: 1.15em;
    padding: 15px 0;
    border-radius: 15px;
  }

  .pad-check:active { transform: translateY(4px); border-bottom-width: 1px; }

  /* Quit button */
  .quit-btn {
    display: block;
    margin: 10px auto 0;
    background: transparent;
    border: 2px solid #ccc;
    border-radius: 12px;
    color: var(--text-soft);
    font-family: 'Nunito', sans-serif;
    font-size: 0.93em;
    font-weight: 700;
    padding: 8px 24px;
    cursor: pointer;
    transition: all 0.18s;
    touch-action: manipulation;
  }

  .quit-btn:hover { border-color: var(--coral); color: var(--coral); }

  /* Results */
  .results-card {
    background: var(--card);
    border-radius: 28px;
    padding: 30px 22px;
    text-align: center;
    margin-bottom: 22px;
    box-shadow: 0 6px 0 var(--border);
  }

  .results-title {
    font-size: 2em;
    font-weight: 900;
    margin-bottom: 4px;
    color: var(--text);
  }

  .results-score {
    font-size: 3.8em;
    font-weight: 900;
    color: var(--orange);
    margin: 7px 0;
  }

  .results-score-label {
    color: var(--text-soft);
    margin-bottom: 4px;
    font-weight: 700;
  }

  .results-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 18px 0;
  }

  .stat-box {
    background: var(--card2);
    border-radius: 16px;
    padding: 14px 8px;
    box-shadow: 0 3px 0 var(--border);
  }

  .stat-value { font-size: 1.75em; font-weight: 900; }
  .stat-label { font-size: 0.8em; color: var(--text-soft); margin-top: 4px; font-weight: 700; }

  .new-record {
    display: inline-block;
    background: var(--yellow);
    color: white;
    font-weight: 900;
    font-size: 1.1em;
    padding: 7px 22px;
    border-radius: 20px;
    border-bottom: 4px solid var(--yellow-sh);
    margin-top: 12px;
    animation: bounce 0.6s infinite alternate;
  }

  @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.08); } }

  .results-buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .results-buttons button {
    font-family: 'Nunito', sans-serif;
    font-size: 1.02em;
    font-weight: 700;
    padding: 13px 24px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.12s;
    touch-action: manipulation;
  }

  .btn-replay {
    background: var(--green);
    color: white;
    border: none;
    border-bottom: 4px solid var(--green-sh);
  }

  .btn-menu {
    background: var(--card2);
    color: var(--text);
    border: 2px solid var(--border);
    border-bottom: 4px solid #c8bfb5;
  }

  .btn-leaderboard {
    background: var(--yellow);
    color: white;
    border: none;
    border-bottom: 4px solid var(--yellow-sh);
  }

  .results-buttons button:hover { filter: brightness(1.07); }
  .results-buttons button:active { transform: translateY(3px); border-bottom-width: 1px !important; }

  /* Leaderboard */
  .leaderboard-card {
    background: var(--card);
    border-radius: 22px;
    padding: 22px;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 var(--border);
    overflow-x: auto;
  }

  .leaderboard-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .tab-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-bottom: 3px solid #c8bfb5;
    border-radius: 12px;
    color: var(--text-soft);
    font-family: 'Nunito', sans-serif;
    font-size: 0.88em;
    font-weight: 700;
    padding: 7px 15px;
    cursor: pointer;
    transition: all 0.12s;
    touch-action: manipulation;
  }

  .tab-btn.active {
    background: var(--purple);
    border-color: var(--purple-sh);
    border-bottom-color: var(--purple-sh);
    color: white;
  }

  .tab-btn:hover:not(.active) { border-color: var(--purple); color: var(--purple); }
  .tab-btn:active { transform: translateY(2px); border-bottom-width: 1px; }

  .leaderboard-table { width: 100%; border-collapse: collapse; }

  .leaderboard-table th {
    color: var(--text-soft);
    font-size: 0.82em;
    text-transform: uppercase;
    padding: 8px;
    border-bottom: 2px solid var(--card2);
    text-align: left;
    font-weight: 700;
  }

  .leaderboard-table td {
    padding: 10px 8px;
    border-bottom: 1px solid #f5ede0;
    font-size: 0.93em;
    color: var(--text);
  }

  .leaderboard-table tr:nth-child(even) td { background: #fdf7ef; }

  .rank-1 { color: #b7800a; font-weight: 900; }
  .rank-2 { color: #6e6e6e; font-weight: 900; }
  .rank-3 { color: #9e5a1f; font-weight: 900; }

  .medal { font-size: 1.25em; }
  .empty-lb { color: var(--text-soft); text-align: center; padding: 28px; font-style: italic; font-weight: 700; }

  .back-btn {
    display: block;
    margin: 0 auto;
    background: var(--blue);
    border: none;
    border-bottom: 4px solid var(--blue-sh);
    border-radius: 16px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1.02em;
    font-weight: 700;
    padding: 12px 34px;
    cursor: pointer;
    transition: all 0.12s;
    touch-action: manipulation;
  }

  .back-btn:hover { filter: brightness(1.08); }
  .back-btn:active { transform: translateY(3px); border-bottom-width: 1px; }

  .clear-btn {
    display: block;
    margin: 13px auto 0;
    background: transparent;
    border: 1px solid #ccc;
    border-radius: 10px;
    color: var(--text-soft);
    font-family: 'Nunito', sans-serif;
    font-size: 0.82em;
    font-weight: 700;
    padding: 6px 17px;
    cursor: pointer;
    transition: all 0.18s;
    touch-action: manipulation;
  }

  .clear-btn:hover { color: var(--coral); border-color: var(--coral); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    z-index: 100;
    animation: confetti-fall var(--fall-dur) linear forwards;
  }

  @keyframes confetti-fall {
    to { top: 110vh; transform: rotate(var(--rot)) translateX(var(--drift)); }
  }

  @keyframes flash-green {
    0% { box-shadow: 0 6px 0 var(--border), 0 0 0 0 rgba(39,174,96,0.5); }
    100% { box-shadow: 0 6px 0 var(--border), 0 0 55px 22px rgba(39,174,96,0); }
  }

  .flash-correct { animation: flash-green 0.5s; }

  /* Responsive */
  @media (max-width: 500px) {
    .mode-grid { grid-template-columns: 1fr; }
    h1 { font-size: 1.65em; }
    .question-text { font-size: 2.6em; }
    .answer-input { font-size: 2em; width: 145px; }
    .results-score { font-size: 3em; }
    .numpad { max-width: 255px; gap: 8px; }
    .pad-btn { font-size: 1.4em; padding: 12px 0; }
    .pad-check { font-size: 1.05em; padding: 13px 0; }
  }
</style>
</head>
<body>

<div class="bg-deco" aria-hidden="true">
  <span style="left:4%;top:8%;--dur:6.5s;--delay:0s">×</span>
  <span style="left:91%;top:13%;--dur:7.2s;--delay:1s">+</span>
  <span style="left:14%;top:78%;--dur:8.1s;--delay:0.5s">÷</span>
  <span style="left:82%;top:72%;--dur:5.8s;--delay:2s">=</span>
  <span style="left:50%;top:4%;--dur:9.0s;--delay:0.3s">×</span>
  <span style="left:33%;top:88%;--dur:6.3s;--delay:1.5s">+</span>
  <span style="left:72%;top:42%;--dur:7.7s;--delay:0.8s">×</span>
  <span style="left:22%;top:52%;--dur:5.5s;--delay:2.5s">=</span>
</div>

<div class="lang-bar">
  <button class="lang-btn active" data-lang="ca" onclick="setLanguage('ca')">🇪🇸 CA</button>
  <button class="lang-btn" data-lang="es" onclick="setLanguage('es')">🇪🇸 ES</button>
  <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">🇬🇧 EN</button>
</div>

<div class="container">
  <h1 data-i18n="title">Practica les Taules!</h1>

  <!-- SETUP SCREEN -->
  <div class="screen active" id="screen-setup">
    <div class="name-section">
      <label class="name-label" data-i18n="name_label">El teu nom:</label>
      <input type="text" class="name-input" id="player-name"
             data-i18n-ph="name_placeholder" placeholder="Escriu el teu nom" maxlength="15">
    </div>

    <p class="section-title" data-i18n="tables_q">Quines taules vols practicar?</p>
    <div class="select-helpers">
      <button class="helper-btn" onclick="selectAll()" data-i18n="sel_all">Totes</button>
      <button class="helper-btn" onclick="selectNone()" data-i18n="sel_none">Cap</button>
      <button class="helper-btn" onclick="selectHard()" data-i18n="sel_hard">Les difícils</button>
      <button class="helper-btn" onclick="selectWeak()" data-i18n="sel_weak">Les que fallo</button>
    </div>
    <div class="tables-grid">
      <button class="table-btn" data-table="1" onclick="toggleTable(this,1)">1</button>
      <button class="table-btn" data-table="2" onclick="toggleTable(this,2)">2</button>

// --- State ---
let selectedTables = new Set();

const TOTAL_QUESTIONS = 20;
const STORAGE_KEY = 'mult_practice_scores';
const ERRORS_KEY = 'mult_practice_errors';

// --- Init ---
window.addEventListener('DOMContentLoaded', () => {
  const savedLang = localStorage.getItem('mult_lang') || 'ca';
  applyLanguage(savedLang);
  loadPlayerName();

// --- Table selection ---
function toggleTable(btn, n) {
  if (selectedTables.has(n)) { selectedTables.delete(n); btn.classList.remove('selected'); }
  else { selectedTables.add(n); btn.classList.add('selected'); }
  checkReady();
}

function selectAll() {
  document.querySelectorAll('.table-btn').forEach(btn => {
    selectedTables.add(parseInt(btn.dataset.table));
    btn.classList.add('selected');
  });
  checkReady();
}

function selectNone() {
  selectedTables.clear();
  document.querySelectorAll('.table-btn').forEach(btn => btn.classList.remove('selected'));
  checkReady();
}

function selectHard() {
  selectNone();
  [6,7,8,9].forEach(n => {
    selectedTables.add(n);
    document.querySelector(`.table-btn[data-table="${n}"]`).classList.add('selected');
  });
  checkReady();
}

// --- Error stats (per-user) ---
function getUserKey() {
  const n = document.getElementById('player-name').value.trim().toLowerCase();
  return n || '_default';
}

function getAllErrorStats() {
  let raw;
  try { raw = JSON.parse(localStorage.getItem(ERRORS_KEY)) || {}; }
  catch { raw = {}; }
  // One-time migration: old flat format had keys like "7x8" at top level
  const keys = Object.keys(raw);
  if (keys.length > 0 && keys.every(k => /^\d+x\d+$/.test(k))) {
    raw = { _default: raw };
    localStorage.setItem(ERRORS_KEY, JSON.stringify(raw));
  }
  return raw;
}

function getErrorStats() {
  return getAllErrorStats()[getUserKey()] || {};
}

function saveErrorStat(a, b, wasCorrect) {
  const all = getAllErrorStats();
  const uk = getUserKey();
  if (!all[uk]) all[uk] = {};
  const key = a + 'x' + b;
  if (!all[uk][key]) all[uk][key] = { attempts: 0, errors: 0 };
  all[uk][key].attempts++;
  if (!wasCorrect) all[uk][key].errors++;
  localStorage.setItem(ERRORS_KEY, JSON.stringify(all));
}

function getWeakProblems() {
  const stats = getErrorStats();
  const weak = [];
  for (const [key, val] of Object.entries(stats)) {
    if (val.attempts >= 3 && val.errors / val.attempts > 0.4) {
      const [a, b] = key.split('x').map(Number);
      weak.push({ a, b });
    }
  }
  return weak;
}

function selectWeak() {
  const weak = getWeakProblems();
  if (weak.length === 0) { alert(t('no_data_alert')); return; }
  selectNone();
  new Set(weak.map(w => w.a)).forEach(n => {
    selectedTables.add(n);
    document.querySelector(`.table-btn[data-table="${n}"]`).classList.add('selected');
  });
  checkReady();
}

function selectMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedMode = btn.dataset.mode;
  checkReady();
}

function checkReady() {
  document.getElementById('start-btn').disabled = !(selectedTables.size > 0 && selectedMode);

// --- Screen management ---
function showScreen(name) {

  document.getElementById('screen-' + name).classList.add('active');

// --- Number pad ---
function padInput(digit) {
  if (gameState && gameState.answering) return;
  const input = document.getElementById('answer-input');
  if (input.value.length < 4) input.value += digit;
}

function padBackspace() {
  if (gameState && gameState.answering) return;
  const input = document.getElementById('answer-input');
  input.value = input.value.slice(0, -1);
}

// --- Game logic ---
function generateQuestionList() {
  const MAX_REPEAT = 4;
  const MIN_GAP = 2;

  // Build weighted pool using this user's error stats
  const userStats = getErrorStats();
  const pool = [];
  for (const a of selectedTables) {
    for (let b = 1; b <= 10; b++) {
      const key = a + 'x' + b;
      const s = userStats[key] || { attempts: 0, errors: 0 };
      const errorRate = s.attempts > 0 ? s.errors / s.attempts : 0;
      const confidence = Math.min(s.attempts, 5) / 5;
      const weight = 1 + 2 * errorRate * confidence; // [1, 3]
      pool.push({ a, b, answer: a * b, key, weight });
    }
  }

  // Weighted-random pick helper
  function weightedPick(candidates) {
    const total = candidates.reduce((s, c) => s + c.weight, 0);
    let r = Math.random() * total;
    for (const c of candidates) {
      r -= c.weight;
      if (r <= 0) return c;
    }
    return candidates[candidates.length - 1];
  }

  const questions = [];
  const counts = {};    // key → how many times picked so far
  const lastPos = {};   // key → index of last placement

  for (let i = 0; i < TOTAL_QUESTIONS; i++) {
    // Filter 1: full constraint (cap + spacing)
    let candidates = pool.filter(p => {
      if ((counts[p.key] || 0) >= MAX_REPEAT) return false;
      const lp = lastPos[p.key];
      if (lp !== undefined && i - lp <= MIN_GAP) return false;
      return true;
    });

    // Filter 2: relax spacing if nothing available (keep cap + no immediate repeat)
    if (candidates.length === 0) {
      const prev = questions[i - 1];
      candidates = pool.filter(p => {
        if ((counts[p.key] || 0) >= MAX_REPEAT) return false;
        if (prev && p.key === prev.key) return false;
        return true;
      });
    }

    // Final fallback: anything except the immediately preceding question
    if (candidates.length === 0) {
      const prev = questions[i - 1];
      candidates = pool.filter(p => !(prev && p.key === prev.key));
    }

    // Absolute fallback: full pool (can't happen with ≥10 pairs + cap 4)
    if (candidates.length === 0) candidates = pool;

    const picked = weightedPick(candidates);
    questions.push(picked);
    counts[picked.key] = (counts[picked.key] || 0) + 1;
    lastPos[picked.key] = i;
  }

  return questions;
}

function getMultiplier() {
  return selectedMode === '5' ? 3 : selectedMode === '10' ? 2 : selectedMode === '20' ? 1.5 : 1;
}

function startGame() {
  const isTimed = selectedMode !== 'free';
  gameState = {
    mode: selectedMode,
    tables: Array.from(selectedTables),
    score: 0, correct: 0, wrong: 0,
    streak: 0, bestStreak: 0,
    questionNum: 0, totalQuestions: TOTAL_QUESTIONS,
    timePerQuestion: isTimed ? parseInt(selectedMode) : null,
    questionTimeLeft: null,
    multiplier: getMultiplier(),
    currentQuestion: null,
    questions: generateQuestionList(),
    finished: false, answering: false,
  };

  showScreen('game');
  document.getElementById('game-score').textContent = '0';
  document.getElementById('game-streak').textContent = '0';
  document.getElementById('game-timer').style.display = isTimed ? '' : 'none';
  updateProgress();
  nextQuestion();
}

function startQuestionTimer() {
  clearInterval(timerInterval);
  if (!gameState.timePerQuestion) return;

  gameState.questionTimeLeft = gameState.timePerQuestion;
  const timerEl = document.getElementById('game-timer');
  timerEl.className = 'timer-display';
  timerEl.textContent = gameState.questionTimeLeft + 's';

  timerInterval = setInterval(() => {
    gameState.questionTimeLeft--;
    timerEl.textContent = gameState.questionTimeLeft + 's';
    const total = gameState.timePerQuestion;
    if (gameState.questionTimeLeft <= Math.ceil(total * 0.2)) timerEl.className = 'timer-display danger';
    else if (gameState.questionTimeLeft <= Math.ceil(total * 0.5)) timerEl.className = 'timer-display warning';
    if (gameState.questionTimeLeft <= 0) { clearInterval(timerInterval); handleTimeout(); }
  }, 1000);
}

function handleTimeout() {
  if (gameState.finished || gameState.answering) return;
  gameState.answering = true;
  const q = gameState.currentQuestion;
  gameState.wrong++;
  gameState.streak = 0;
  saveErrorStat(q.a, q.b, false);
  const input = document.getElementById('answer-input');
  const feedback = document.getElementById('feedback');
  input.className = 'answer-input wrong';
  feedback.className = 'feedback wrong-fb';
  feedback.textContent = t('timeout')(q.a, q.b, q.answer);
  document.getElementById('game-streak').textContent = '0';
  setTimeout(() => { gameState.answering = false; nextQuestion(); }, 1500);
}

function nextQuestion() {
  if (gameState.finished) return;
  clearInterval(timerInterval);
  if (gameState.questionNum >= gameState.totalQuestions) { endGame(); return; }

  gameState.questionNum++;
  gameState.currentQuestion = gameState.questions[gameState.questionNum - 1];
  const q = gameState.currentQuestion;
  document.getElementById('question-text').innerHTML =
    `${q.a} <span class="operator">&times;</span> ${q.b} <span class="equals">=</span> ?`;

  const input = document.getElementById('answer-input');
  input.value = '';
  input.className = 'answer-input';
  if (!input.hasAttribute('readonly')) input.focus();
  document.getElementById('feedback').innerHTML = '&nbsp;';
  updateProgress();
  startQuestionTimer();
}

function submitAnswer() {
  if (!gameState || gameState.answering || gameState.finished) return;
  const input = document.getElementById('answer-input');
  const val = parseInt(input.value);
  if (isNaN(val)) return;

  gameState.answering = true;
  clearInterval(timerInterval);

  const correct = val === gameState.currentQuestion.answer;
  const feedback = document.getElementById('feedback');
  const card = document.getElementById('question-card');
  const q = gameState.currentQuestion;

  saveErrorStat(q.a, q.b, correct);

  if (correct) {
    const points = Math.round((10 + Math.min(gameState.streak, 10) * 2) * gameState.multiplier);
    gameState.score += points;
    gameState.correct++;
    gameState.streak++;
    if (gameState.streak > gameState.bestStreak) gameState.bestStreak = gameState.streak;

    input.className = 'answer-input correct';
    feedback.className = 'feedback correct-fb';
    feedback.textContent = randomPraise() + ` (+${points})`;
    card.classList.remove('flash-correct');
    void card.offsetWidth;
    card.classList.add('flash-correct');
    document.getElementById('game-score').textContent = gameState.score;
    document.getElementById('game-streak').textContent = gameState.streak;

    setTimeout(() => { gameState.answering = false; nextQuestion(); }, 600);
  } else {
    gameState.wrong++;
    gameState.streak = 0;
    input.className = 'answer-input wrong';
    feedback.className = 'feedback wrong-fb';
    feedback.textContent = t('wrong_ans')(q.a, q.b, q.answer);
    document.getElementById('game-streak').textContent = '0';
    setTimeout(() => { gameState.answering = false; nextQuestion(); }, 1500);
  }
}

function updateProgress() {
  const pct = (gameState.questionNum / TOTAL_QUESTIONS) * 100;
  document.getElementById('progress-fill').style.width = Math.min(pct, 100) + '%';
  document.getElementById('progress-text').textContent =
    t('question_x_of_y')(Math.min(gameState.questionNum, TOTAL_QUESTIONS), TOTAL_QUESTIONS);
}

function randomPraise() {
  const p = t('praise');
  return p[Math.floor(Math.random() * p.length)];
}

function endGame() {
  if (gameState.finished) return;
  gameState.finished = true;
  clearInterval(timerInterval);

  const isNewRecord = saveScore();
  showScreen('results');

  const pct = gameState.correct / (gameState.correct + gameState.wrong);
  let titleKey = 'title_ben_fet';
  if (pct >= 0.95) titleKey = 'title_increible';
  else if (pct >= 0.8) titleKey = 'title_molt_be';
  else if (pct >= 0.6) titleKey = 'title_bona_feina';
  else if (pct < 0.4) titleKey = 'title_continua';

  document.getElementById('results-title').textContent = t(titleKey);
  document.getElementById('results-score').textContent = gameState.score;
  document.getElementById('stat-correct').textContent = gameState.correct;
  document.getElementById('stat-wrong').textContent = gameState.wrong;
  document.getElementById('stat-streak').textContent = gameState.bestStreak;

  document.getElementById('new-record-container').innerHTML = isNewRecord
    ? `<div class="new-record">${t('new_record')}</div>` : '';

  if (pct >= 0.7) spawnConfetti();
}

function quitGame() {
  if (!gameState) return;
  gameState.finished = true;
  clearInterval(timerInterval);
  showScreen('setup');
}

// --- Scoring & Storage ---
function getScores() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveScore() {
  const entry = {
    name: getPlayerName(),
    score: gameState.score,
    correct: gameState.correct,
    wrong: gameState.wrong,
    bestStreak: gameState.bestStreak,
    tables: gameState.tables.sort((a, b) => a - b),
    mode: gameState.mode,
    date: new Date().toISOString(),
  };
  const scores = getScores();
  const isRecord = scores.length === 0 || entry.score > Math.max(...scores.map(s => s.score));
  scores.push(entry);
  scores.sort((a, b) => b.score - a.score);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(scores.slice(0, 50)));
  return isRecord && entry.score > 0;
}

function clearScores() {
  if (confirm(t('clear_confirm'))) {
    localStorage.removeItem(STORAGE_KEY);
    renderLeaderboard('all');
  }
}

// --- Leaderboard ---
function showLeaderboard() {
  showScreen('leaderboard');
  buildLBTabs();
  renderLeaderboard('all');
}

function buildLBTabs() {
  const tabs = document.getElementById('lb-tabs');
  const prevFilter = (tabs.querySelector('.tab-btn.active') || {}).dataset?.filter || 'all';
  tabs.innerHTML = '';
  const modes = [
    { key: 'all', labelKey: 'lb_tab_all' },
    { key: 'free', labelKey: 'lb_tab_free' },
    { key: '5', labelKey: 'lb_tab_5' },
    { key: '10', labelKey: 'lb_tab_10' },
    { key: '20', labelKey: 'lb_tab_20' },
  ];
  modes.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (m.key === prevFilter ? ' active' : '');
    btn.textContent = t(m.labelKey);
    btn.dataset.filter = m.key;
    btn.addEventListener('click', () => {
      tabs.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLeaderboard(m.key);
    });
    tabs.appendChild(btn);
  });
}

function renderLeaderboard(filter) {
  let scores = getScores();
  if (filter !== 'all') scores = scores.filter(s => s.mode === filter);
  const body = document.getElementById('lb-body');
  const empty = document.getElementById('lb-empty');
  if (scores.length === 0) {
    body.innerHTML = '';
    empty.style.display = '';
    empty.textContent = t('lb_empty');
    return;
  }
  empty.style.display = 'none';
  body.innerHTML = scores.slice(0, 20).map((s, i) => {
    const rank = i + 1;
    const medal = rank === 1 ? '<span class="medal">🥇</span>' :
                  rank === 2 ? '<span class="medal">🥈</span>' :
                  rank === 3 ? '<span class="medal">🥉</span>' : rank;
    const rankClass = rank <= 3 ? `rank-${rank}` : '';
    const modeLabel = s.mode === 'free' ? t('lb_mode_free') : t('lb_mode_timed')(s.mode);
    return `<tr>
      <td class="${rankClass}">${medal}</td>
      <td>${escHtml(s.name)}</td>
      <td class="${rankClass}">${s.score}</td>
      <td>${s.correct}/${s.correct + s.wrong}</td>
      <td>${modeLabel}</td>
    </tr>`;
  }).join('');
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function replay() { startGame(); }

// --- Confetti ---
function spawnConfetti() {
  const colors = ['#27ae60','#e67e22','#2980b9','#8e44ad','#f39c12','#e74c3c'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.setProperty('--fall-dur', (1.5 + Math.random() * 2) + 's');
    el.style.setProperty('--rot', Math.floor(Math.random() * 720) + 'deg');
    el.style.setProperty('--drift', (Math.random() * 200 - 100) + 'px');
    el.style.animationDelay = Math.random() * 0.5 + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

// --- Global Enter key handler ---
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('screen-game').classList.contains('active')) {
    submitAnswer();
  }
});
</script>
